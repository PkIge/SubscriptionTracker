workflows:
  ios-build:
    name: SubscriptionTracker Unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: 'SubscriptionTracker.xcodeproj'
        XCODE_SCHEME: 'SubscriptionTracker'
        APP_NAME: 'SubscriptionTracker'
    scripts:
      - name: Verify Project Layout
        script: |
          set -euo pipefail
          PROJECT_PATH="$CM_BUILD_DIR/$XCODE_PROJECT"
          echo "CM_BUILD_DIR: $CM_BUILD_DIR"
          cd "$CM_BUILD_DIR"
          pwd
          ls -la
          test -d "$PROJECT_PATH"
          test -f "$PROJECT_PATH/project.pbxproj"
          test -f "$PROJECT_PATH/xcshareddata/xcschemes/SubscriptionTracker.xcscheme"
          xcodebuild -list -project "$PROJECT_PATH"

      - name: Build unsigned iPhoneOS app
        script: |
          set -euo pipefail
          PROJECT_PATH="$CM_BUILD_DIR/$XCODE_PROJECT"
          cd "$CM_BUILD_DIR"
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SYMROOT="$CM_BUILD_DIR/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          APP_PATH="$CM_BUILD_DIR/build/Release-iphoneos/$APP_NAME.app"
          IPA_PATH="$CM_BUILD_DIR/build/$APP_NAME-unsigned.ipa"
          test -d "$APP_PATH"
          rm -rf Payload "$IPA_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -r "$IPA_PATH" Payload

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
