name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build On macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Latest Stable Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Show Schemes
        run: xcodebuild -list -project SubscriptionTracker.xcodeproj

      - name: Build iOS App For Simulator
        run: |
          xcodebuild \
            -project SubscriptionTracker.xcodeproj \
            -scheme SubscriptionTracker \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
